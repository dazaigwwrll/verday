# Netlify deploy config for Verday (web + serverless API, free, no card/phone).
[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Bundle functions with esbuild so ESM/CJS interop (express, pg, …)
# resolves cleanly into a single file.
[functions]
  node_bundler = "esbuild"

# Route API calls to the serverless function...
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# ...and everything else to the single-page app.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
