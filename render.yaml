# Render Blueprint for the planner sync server (free tier).
# In Render: New + → Blueprint → connect this repo. Render reads
# this file and creates the service. Then set DATABASE_URL (from
# Neon) in the service's Environment tab.
services:
  - type: web
    name: planner-sync
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false # paste your Neon connection string in the dashboard
      - key: JWT_SECRET
        generateValue: true # Render generates a strong secret once
